<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login – GlobeWest 2026</title>
  <meta name="description" content="Log in to your GlobeWest customer dashboard.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 500px;
      margin: 3rem auto;
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 2.5rem;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to Main Content</a>

  <header>
    <a href="index.html" class="logo">GlobeWest<span>2026</span></a>
    <nav>
      <a href="index.html">Home</a>
      <a href="plp.html">PLP (Browse)</a>
      <a href="pdp.html">PDP (Detail)</a>
      <a href="search.html">Search</a>
      <a href="checkout.html">Checkout</a>
      <a href="account.html" class="active">Account</a>
      <a href="trade.html">Trade Portal</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="report.html">Report</a>
    </nav>
  </header>

  <main class="main" id="main-content" tabindex="-1">
    <div class="login-container">
      <h1>Customer Login</h1>
      <p>Log in with your email and password to view order history and shipping details.</p>

      <form id="login-form" aria-label="Customer Login Form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" required>
        </div>

        <button type="button" class="btn" style="width: 100%; margin-top: 1rem;" onclick="login()">Log In</button>
      </form>
      
      <div style="margin-top: 1.5rem; text-align: center; font-size: 0.95rem;">
        <a href="#" style="color: var(--text-secondary); text-decoration: none;">Forgot Your Password?</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 GlobeWest 2026. All rights reserved.</p>
  </footer>

  <script>
    function login() {
      const email = document.getElementById('login-email').value;
      if (!email) {
        alert('Please fill out your email address!');
        return;
      }
      alert('Login successful! Redirecting to dashboard...');
    }
  </script>
</body>
</html>
